<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#16A34A',
                        snake: '#16A34A'
                    },
                    fontFamily: {
                        inter: ['"华文苹方"', 'PingFang', '"微软雅黑"', '"Source Code Pro"', 'Tahoma', '"Helvetica Neue"', 'Helvetica', '"Hiragino Sans GB"', '"Microsoft YaHei Light"', '"Microsoft YaHei"', '"Source Han Sans CN"', '"WenQuanYi Micro Hei"', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --snake-bg: #f6f9f4;
            --snake-panel: #ffffff;
            --snake-accent: #16A34A;
            --snake-screen: #0f1c17;
        }

        body {
            background-color: var(--snake-bg);
        }

        .game-card {
            max-width: 72rem; /* match Tailwind max-w-6xl for outer card */
            width: 100%;
            margin: 0 auto;
        }

        .game-canvas {
            width: 600px;
            height: 600px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            background: var(--snake-screen);
            border: 2px solid rgba(16, 163, 74, 0.08);
        }

        .game-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-weight: 600;
            color: #334155;
        }

        .game-over-overlay {
            display: none;
            text-align: center;
        }

        .game-over-overlay.show {
            display: block;
        }
    </style>
</head>

<body class="font-inter bg-gray-50 text-gray-800 min-h-screen flex flex-col">
    <!-- 页面头部 -->
    <header class="bg-white/80 backdrop-blur-sm shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <div class="text-snake mr-2">
                    <i class="fa-solid fa-gamepad text-2xl"></i>
                </div>
                <h1 class="text-xl md:text-2xl font-bold text-snake">贪吃蛇</h1>
            </div>
            <div class="flex space-x-4">
                <a href="index.html" class="bg-tool-eat hover:bg-tool-eat/90 text-tool-eat font-bold py-2 px-4 rounded-lg shadow-md flex items-center"
                    title="返回工具箱">
                    <i class="fa-solid fa-arrow-left mr-2"></i>
                    返回工具箱
                </a>
                <a href="https://www.hudi.site" class="bg-tool-eat hover:bg-tool-eat/90 text-tool-eat font-bold py-2 px-4 rounded-lg shadow-md flex items-center"
                    target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-blog mr-2"></i>
                    访问我的主页
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-6 md:py-10 max-w-6xl">
        <div class="max-w-6xl mx-auto">
            <div class="bg-white rounded-2xl shadow-sm p-6 mb-8">
                <p class="text-center text-base md:text-lg text-gray-600">复古风格贪吃蛇游戏。使用方向键控制，吃到食物得分，支持穿墙与本地最高分存储。</p>
            </div>

            <div class="bg-white rounded-xl shadow-xl p-6 game-card">
                <div class="game-info-row">
                    <div>得分: <span id="score">0</span></div>
                    <div>最高得分: <span id="high-score">0</span></div>
                </div>

                <canvas id="gameCanvas" width="600" height="600" class="game-canvas"></canvas>

                <div id="gameOver" class="game-over-overlay mt-4 p-4 border rounded-lg bg-gray-50">
                    <h2 class="text-lg font-semibold text-gray-800">游戏结束</h2>
                    <p class="text-gray-600">最终得分: <span id="final-score">0</span></p>
                    <div class="mt-3">
                        <button onclick="restartGame()" class="px-4 py-2 rounded-lg bg-snake text-white">重新开始</button>
                    </div>
                </div>

                <div class="mt-4 text-sm text-gray-500">操作说明: ↑↓←→ 或者 W A S D 控制移动。碰到边界会穿墙。</div>
            </div>
        </div>
    </main>

    <!-- 引入外部脚本 -->
    <script src="js/snake.js"></script>
    <!-- 页脚 -->
    <footer class="bg-gray-900 text-white py-6 mt-8">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm text-gray-400 mt-1">挑战你的反应力，刷新最高分！玩累了记得休息一下。</p>

            <!-- 不蒜子统计 -->
            <div class="mt-2 text-xs text-gray-500">
                <span id="busuanzi_container_site_uv">
                    <i class="fa-solid fa-user mr-1"></i>
                    <span id="busuanzi_value_site_uv"></span> 访客
                </span>
                &nbsp;&nbsp;|&nbsp;&nbsp;
                <span id="busuanzi_container_site_pv">
                    <i class="fa-solid fa-eye mr-1"></i>
                    <span id="busuanzi_value_site_pv"></span> 访问
                </span>
            </div>
            <a rel="nofollow" target="_blank" href="https://beian.miit.gov.cn" one-link-mark="yes">皖ICP备18002386号-1</a>
        </div>
    </footer>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>

</html>
